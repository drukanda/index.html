
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drukanda Omni-AI | Public Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: radial-gradient(circle, #020617 0%, #000000 100%); color: #00f3ff; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(0, 243, 255, 0.1); }
        .neon-border { border: 1px solid #00f3ff; box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); }
        .output-box::-webkit-scrollbar { width: 4px; }
        .output-box::-webkit-scrollbar-thumb { background: #00f3ff; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-5xl glass p-8 rounded-3xl shadow-2xl relative overflow-hidden">
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-cyan-500 opacity-10 rounded-full blur-3xl"></div>

        <header class="text-center mb-8">
            <h1 class="text-4xl font-black tracking-tighter uppercase italic">Drukanda <span class="text-white">Omni-AI</span></h1>
            <p class="text-xs text-cyan-500 mt-1 tracking-widest uppercase">Quantum Hybrid v3.0 | Status: Online</p>
        </header>

        <div id="display" class="output-box h-[450px] overflow-y-auto mb-6 space-y-4 p-4 text-sm border-b border-cyan-900/50">
            <div class="text-cyan-700 italic">[SYSTEM]: Link Established. Menunggu input untuk verifikasi publik atau kreasi visual...</div>
        </div>

        <div class="space-y-4">
            <textarea id="prompt" placeholder="Ketik masalah publik atau deskripsi kreatif..." 
                      class="w-full bg-black/50 border border-cyan-800 p-4 rounded-xl text-white focus:outline-none focus:border-cyan-400 h-24 resize-none"></textarea>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
                <button onclick="runAI('tanya')" class="p-3 bg-cyan-900/20 border border-cyan-500 rounded-lg hover:bg-cyan-500 hover:text-black transition font-bold uppercase text-xs tracking-widest">💡 Tanya Publik (100% Akurat)</button>
                <button onclick="runAI('gambar')" class="p-3 bg-purple-900/20 border border-purple-500 rounded-lg hover:bg-purple-500 hover:text-white transition font-bold uppercase text-xs tracking-widest">🎨 Generate Image (Nano 2)</button>
                <button onclick="runAI('video')" class="p-3 bg-blue-900/20 border border-blue-500 rounded-lg hover:bg-blue-500 hover:text-white transition font-bold uppercase text-xs tracking-widest">🎬 Render Video (Veo)</button>
            </div>
        </div>
    </div>

    <script type="module">
        // Import Google AI SDK langsung via URL
        import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

        // KONFIGURASI API (Gunakan Key Ente)
        const API_KEY = "dipasang nanto";
        const genAI = new GoogleGenerativeAI(API_KEY);

        window.runAI = async function(mode) {
            const promptInput = document.getElementById('prompt');
            const display = document.getElementById('display');
            const text = promptInput.value;

            if (!text) return;

            // Update UI
            display.innerHTML += `<div class="text-white bg-white/5 p-3 rounded-lg ml-10"><strong>USER:</strong> ${text}</div>`;
            const aiMsgDiv = document.createElement('div');
            aiMsgDiv.className = "text-cyan-400 p-3 rounded-lg mr-10 bg-cyan-900/10 border-l-2 border-cyan-400";
            aiMsgDiv.innerHTML = `<strong>AI:</strong> <span class="animate-pulse">Memproses ${mode.toUpperCase()}...</span>`;
            display.appendChild(aiMsgDiv);
            promptInput.value = "";
            display.scrollTop = display.scrollHeight;

            try {
                if (mode === 'tanya') {
                    const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
                    const result = await model.generateContent(`Anda adalah Pakar Publik. Jawab dengan data resmi 2026 dan akurasi 100% untuk: ${text}`);
                    aiMsgDiv.innerHTML = `<strong>AI (VERIFIED):</strong> ${result.response.text()}`;
                } else if (mode === 'gambar') {
                    // Integrasi ke Nano Banana 2 (Placeholder untuk UI)
                    aiMsgDiv.innerHTML = `<strong>STUDIO:</strong> Menginisialisasi Engine Nano Banana 2... <br><div class="mt-2 w-full h-40 bg-gray-800 rounded flex items-center justify-center italic text-gray-500 border border-dashed border-gray-600">Simulasi Output Gambar 4K untuk: ${text}</div>`;
                } else {
                    // Integrasi ke Veo (Placeholder untuk UI)
                    aiMsgDiv.innerHTML = `<strong>STUDIO:</strong> Merender Video High-Fidelity via Veo Engine... <br><div class="mt-2 w-full h-40 bg-gray-900 rounded flex items-center justify-center italic text-gray-500 border border-dashed border-gray-700">Simulasi Output Video Pro: ${text}</div>`;
                }
            } catch (error) {
                aiMsgDiv.innerHTML = `<span class="text-red-500 italic">Error: Gagal menghubungkan ke Quantum Core. Cek API Key.</span>`;
            }
            display.scrollTop = display.scrollHeight;
        }
    </script>
</body>
</html>
